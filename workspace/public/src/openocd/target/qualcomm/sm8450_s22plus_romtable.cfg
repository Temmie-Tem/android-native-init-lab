#
# Samsung Galaxy S22+ SM-S906N / g0q / S906NKSS7FYG8, Qualcomm SM8450.
#
# This is an S22+ target draft derived from the stock FYG8 vendor_boot DTB.
# The DTB exposes eight APSS CPU CTIs at 0x12010000..0x12080000, but it does
# not expose per-core debug-base registers.  Deliberately do not hardcode a
# guessed DBGBASE list here; OpenOCD's aarch64 target must discover debug
# components from the MEM-AP ROM table during the first live EUD/SWD probe.
#
# Expected include path:
#   openocd -s <linux-msm-openocd-eud>/install/share/openocd/scripts \
#           -s workspace/public/src/openocd \
#           -f interface/eud.cfg \
#           -f target/qualcomm/sm8450_s22plus_romtable.cfg

if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME SM8450
}

if { [info exists ENDIAN] } {
	set _ENDIAN $ENDIAN
} else {
	set _ENDIAN little
}

if { [info exists NUM_CORES] } {
	set _NUM_CORES $NUM_CORES
} else {
	set _NUM_CORES 8
}

set _DAPNAME $_CHIPNAME.dap

# EUD supports SWD.  Keep JTAG out of the default S22+ path until hardware
# evidence says otherwise.
set _PROTOCOL swd
transport select $_PROTOCOL
adapter speed 500
reset_config trst_and_srst

swd newdap $_CHIPNAME cpu -irlen 15 -expected-id 0x5ba02477
dap create $_DAPNAME -chain-position $_CHIPNAME.cpu -ignore-syspwrupack

# DTB source: /soc/cti@12010000 .. /soc/cti@12080000.
# Note: the cpu5 node name is rendered as cti@112060000 by dtc, but its reg
# property is the valid CTI base below; use reg, not the node-name typo.
set CTIBASE {
	0x12010000
	0x12020000
	0x12030000
	0x12040000
	0x12050000
	0x12060000
	0x12070000
	0x12080000
}

set _targets ""
set smp_targets ""

proc setup_cores {ctibase num} {
	global _CHIPNAME
	global _DAPNAME
	global _ENDIAN
	global _targets
	global smp_targets

	for { set _core 0 } { $_core < $num } { incr _core } {
		set _TARGETNAME $_CHIPNAME.cpu$_core
		set _CTINAME $_TARGETNAME.cti

		cti create $_CTINAME -dap $_DAPNAME -ap-num 1 -baseaddr [lindex $ctibase $_core]

		# No -dbgbase: SM8450/S22+ per-core debug bases are not source-proven in
		# the DTB.  Let OpenOCD's aarch64 target discover them from the ROM table.
		set _command "target create $_TARGETNAME aarch64 -endian $_ENDIAN -dap $_DAPNAME -coreid $_core -cti $_CTINAME -event reset-assert-post { dap init }"
		if { $_core == 0 } {
			set _targets "$_TARGETNAME"
		}
		set smp_targets "$smp_targets $_TARGETNAME"
		eval $_command
		eval "$_TARGETNAME configure -event examine-end { eval $_TARGETNAME arp_halt }"
	}
}

setup_cores $CTIBASE $_NUM_CORES

if { $_NUM_CORES > 1 } {
	eval "target smp $smp_targets"
	targets $_targets
}

gdb breakpoint_override hard
